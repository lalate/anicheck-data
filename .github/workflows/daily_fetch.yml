name: Daily Anime Check

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日00:00 JST (UTC+9なので調整必要)
  workflow_dispatch:     # 手動トリガーも可能

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # または3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install xai-sdk python-dotenv

      - name: Run daily fetch
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: python scripts/anicheck_daily.py

      - name: Commit & push changes (if any)
        run: |
          git config --global user.name 'GitHub Actions[bot]'
          git config --global user.email 'actions@github.com'
          git add current/ logs/
          git diff --staged --quiet || git commit -m "Daily anime data update: ${{ github.run_number }}"
          git push
